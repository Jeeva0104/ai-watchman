global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'watchman-backend'
    static_configs:
      - targets: ['backend:4990']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s